$kind: http-request
method: GET
url: '{{base_url}}/api/{{api_version}}/listings/{{listing_id}}/details'
order: 2000
description: |-
  ## Get Listing Details
  Returns full details of a specific listing. Public endpoint.

  **Authentication:** Optional
  **Roles:** Any (public)
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));

      pm.test('Response has listing data', () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property('id');
          pm.expect(json.data).to.have.property('cropName');
          pm.expect(json.data).to.have.property('pricePerUnit');
      });
    language: text/javascript

$kind: http-request
method: DELETE
url: '{{base_url}}/api/{{api_version}}/listings/{{listing_id}}'
order: 5000
description: |-
  ## Delete Listing
  Deletes a crop listing permanently.

  **Authentication:** Required (Bearer Token)
  **Roles:** Farmer (own listings only)
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));

      pm.test('Success flag is true', () => {
          pm.expect(pm.response.json().success).to.be.true;
      });
    language: text/javascript

$kind: http-request
method: PATCH
url: '{{base_url}}/api/{{api_version}}/listings/{{listing_id}}'
order: 4000
description: |-
  ## Update Listing
  Updates an existing crop listing.

  **Authentication:** Required (Bearer Token)
  **Roles:** Farmer (own listings only)
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "quantity": 400,
      "pricePerUnit": 375,
      "description": "Updated: Premium organic cassava, limited stock"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));

      pm.test('Success flag is true', () => {
          pm.expect(pm.response.json().success).to.be.true;
      });
    language: text/javascript

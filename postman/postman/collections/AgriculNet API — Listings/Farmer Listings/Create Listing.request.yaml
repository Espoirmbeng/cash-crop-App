$kind: http-request
method: POST
url: '{{base_url}}/api/{{api_version}}/listings'
order: 3000
description: |-
  ## Create Listing
  Creates a new crop listing for farmers.

  **Authentication:** Required (Bearer Token)
  **Roles:** Farmer only
  **Rate Limit:** 10 requests/minute

  ### Request Body
  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | cropName | string | Yes | Name of the crop |
  | variety | string | No | Crop variety |
  | quantity | number | Yes | Amount available |
  | unit | string | Yes | kg, tonnes, bags |
  | pricePerUnit | number | Yes | Price in XAF |
  | currency | string | Yes | Currency code (XAF) |
  | location | object | Yes | Region and city |
  | harvestDate | string | No | ISO date of harvest |
  | availableDate | string | No | ISO date available |
  | qualityGrade | string | No | A, B, or C |
  | certifications | array | No | List of certifications |
  | description | string | No | Listing description |
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "cropName": "Cassava",
      "variety": "Sweet White",
      "quantity": 500,
      "unit": "kg",
      "pricePerUnit": 350,
      "currency": "XAF",
      "location": {
        "region": "South West",
        "city": "Kumba"
      },
      "harvestDate": "2025-03-15",
      "availableDate": "2025-03-20",
      "qualityGrade": "A",
      "certifications": ["Organic"],
      "description": "Premium organic cassava from Green Valley Farm"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201 - Created', () => {
          pm.response.to.have.status(201);
      });

      pm.test('Response has listing ID', () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property('id');
          pm.collectionVariables.set('listing_id', json.data.id);
      });

      pm.test('Success flag is true', () => {
          pm.expect(pm.response.json().success).to.be.true;
      });
    language: text/javascript

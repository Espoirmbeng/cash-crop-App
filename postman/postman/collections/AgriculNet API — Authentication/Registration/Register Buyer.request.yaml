$kind: http-request
method: POST
url: '{{base_url}}/api/{{api_version}}/auth/register/buyer'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Alain",
      "lastName": "Tabe",
      "phone": "+237699000456",
      "email": "alain@test.agriculnet.cm",
      "password": "BuyerPass@2025",
      "confirmPassword": "BuyerPass@2025",
      "buyerType": "local",
      "country": "Cameroon",
      "city": "Douala",
      "agreeToTerms": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      const d = pm.response.json().data;
      if (d?.user) pm.collectionVariables.set('buyer_id', d.user.id);
    language: text/javascript

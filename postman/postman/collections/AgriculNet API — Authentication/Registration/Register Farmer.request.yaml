$kind: http-request
method: POST
url: '{{base_url}}/api/{{api_version}}/auth/register/farmer'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jean",
      "lastName": "Ngum",
      "phone": "+237674000123",
      "email": "jean@test.agriculnet.cm",
      "password": "FarmerPass@2025",
      "confirmPassword": "FarmerPass@2025",
      "region": "South West",
      "city": "Kumba",
      "farmName": "Green Valley",
      "agreeToTerms": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      const d = pm.response.json().data;
      if (d?.user) pm.collectionVariables.set('farmer_id', d.user.id);
    language: text/javascript

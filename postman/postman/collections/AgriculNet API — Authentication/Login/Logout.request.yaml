$kind: http-request
method: POST
url: '{{base_url}}/api/{{api_version}}/auth/logout'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refresh_token}}"
    }
